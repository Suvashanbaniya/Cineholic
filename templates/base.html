<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initail-scale=1.0">
        <title>{%block title%} CineReview {%endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    
    <body>
        <!---->========navbar====--!--->
        <nav class ="navbar navbar-expand-lg navbar-grey bg-blue">
          
            <div class="container">

                <a class="navbar-brand fw-bold"href="{%url'home'%}">
                    CineReview 
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link"href="{%url 'movie_detail'%}">Browse</a>
                    {% if user.is_authenticated %}
                     {%if user.is_verifeied %}
                    <a class="nav-link"href="{%url 'add_content'%}">Add Title</a>
                    {% endif %}
                    <a class="nav-link" href="{%url 'profile' %}">{{ user.username }}</a>
                <a class="nav-link" href="{%url 'logout '%} ">Logout</a>
                {% else %}
                <!--if not login -->
                <a class="nav-link" href="{% url 'login' %}">Login</a>
                <a class="nav-link" href="{% url 'register'%}">Register</a>
                {%endif%}
                </div>
            </div>
        </nav>

        <!--flash message-->
        <div class="container mt-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags}} alert-dismissible fade show">
                {{ message}}

                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- main content area -->
             <div class="container my-4">
                {% block content %}
                {% endblock %}
             </div>

             <!--bootstap javascript - need for the alerts and dropsdowns -->
                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
